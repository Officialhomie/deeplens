<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepLens</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --text: #e2e2f0;
        --muted: #9898b0;
        --accent: #5b5dff;
        --teal: #00d4aa;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: radial-gradient(
            ellipse 80% 60% at 50% -10%,
            rgba(91, 93, 255, 0.25),
            transparent
          ),
          var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 0.5rem;
      }
      h1 span {
        color: var(--accent);
      }
      p {
        max-width: 36rem;
        color: var(--muted);
        line-height: 1.6;
      }
      nav {
        margin-top: 2rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      a {
        color: var(--teal);
        text-decoration: none;
        padding: 0.6rem 1.2rem;
        border: 1px solid rgba(0, 212, 170, 0.35);
        border-radius: 8px;
      }
      a:hover {
        background: rgba(0, 212, 170, 0.1);
      }
    </style>
  </head>
  <body>
    <h1>Deep<span>Lens</span></h1>
    <p>
      AI-powered contextual intelligence for the web. Hover any word or select a
      phrase for streaming deep context—without leaving the page.
    </p>
    <nav>
      <a href="./privacy/">Privacy Policy</a>
      <a href="https://github.com/Officialhomie/deeplens" rel="noopener"
        >GitHub</a
      >
    </nav>
  </body>
</html>
