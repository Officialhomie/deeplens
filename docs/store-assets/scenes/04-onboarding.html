<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DeepLens — Onboarding</title>
    <style>
      body {
        margin: 0;
        width: 1280px;
        height: 800px;
        background: #0a0a0f;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        color: #e2e2f0;
      }
      .frame {
        width: 320px;
        background: #13131f;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        padding: 14px 16px 16px;
      }
      .popup-header {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }
      .logo {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #5b5dff, #00d4aa);
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 800;
      }
      .step {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }
      .step-num {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .step-quick {
        background: rgba(245, 166, 35, 0.2);
        color: #f5a623;
      }
      .step-deep {
        background: rgba(91, 93, 255, 0.2);
        color: #8b8dff;
      }
      .step-links {
        background: rgba(0, 212, 170, 0.15);
        color: #00d4aa;
      }
      .step p {
        margin: 4px 0 0;
        font-size: 0.8rem;
        color: #9898b0;
      }
      .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 8px;
      }
      .btn {
        padding: 8px 14px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.85rem;
        border: none;
      }
      .btn-primary {
        background: #5b5dff;
        color: #fff;
      }
      .btn-ghost {
        background: transparent;
        color: #9898b0;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <header class="popup-header">
        <div class="logo">DL</div>
        <div>
          <strong>DeepLens</strong>
          <div style="font-size: 0.75rem; color: #9898b0">Quick start</div>
        </div>
      </header>
      <div class="step">
        <span class="step-num step-quick">1</span>
        <div>
          <strong>Hover to discover</strong>
          <p>Pause on any word for 300ms to get context.</p>
        </div>
      </div>
      <div class="step">
        <span class="step-num step-deep">2</span>
        <div>
          <strong>Pick your mode</strong>
          <p>Quick for speed, Deep for full cognitive context.</p>
        </div>
      </div>
      <div class="step">
        <span class="step-num step-links">3</span>
        <div>
          <strong>Select text</strong>
          <p>Highlight a phrase for deeper lookups on demand.</p>
        </div>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost">Skip</button>
        <button type="button" class="btn btn-primary">You're ready</button>
      </div>
    </div>
  </body>
</html>
